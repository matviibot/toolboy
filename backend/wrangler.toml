name = "toolboy-relay"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[vars]
# Lock this to your toolboy origin in production (comma-separated for several).
# "*" is safe only because the backend uses no cookies/credentials.
ALLOWED_ORIGINS = "*"

# Discovery index. Create once with:  wrangler d1 create toolboy-index
# then paste the printed database_id below and apply schema.sql.
[[d1_databases]]
binding = "DB"
database_name = "toolboy-index"
database_id = "local"   # replace with the real id from `wrangler d1 create`

# Future hardening (security.md lists rate-limiting for the relay): bind a KV
# namespace and add a fixed-window limiter keyed by cf.ip in src/relay.ts. The
# README also notes KV as the cache layer for /discover.
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<created via: wrangler kv namespace create RATE_LIMIT>"
