name = "toolboy-relay"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# The relay is stateless — no D1, no KV bindings needed for forwarding. The
# discovery index (the backend's second inhabitant, still to come) will add a D1
# binding here; the cache index will add KV. Keep them out until they exist.

[vars]
# Lock this to your toolboy origin in production (comma-separated for several).
# "*" is safe only because the relay uses no cookies/credentials.
ALLOWED_ORIGINS = "*"

# A future hardening step (security.md lists rate-limiting): bind a KV namespace
# and add a fixed-window limiter keyed by cf.ip in src/index.ts.
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<created via: wrangler kv namespace create RATE_LIMIT>"
